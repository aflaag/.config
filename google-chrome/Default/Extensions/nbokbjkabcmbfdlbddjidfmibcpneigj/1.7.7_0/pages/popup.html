<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SmoothScroll</title>
  <style>
    body {
      width: 250px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      color: #495057;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      background-image: url(../img/128n.png);
      background-repeat: no-repeat;
      background-position: left center;
      background-size: 40px 40px;
      padding-left: 50px;
      display: inline-block;
      line-height: 40px;
      mix-blend-mode: darken;
    }
    .logo span {
      background-image: linear-gradient(0deg, #3d7ad7, #4fb3f9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .status {
      font-size: 16px;
      margin-bottom: 10px;
      color: #212529;
    }
    .domain {
      font-size: 14px;
      color: #6c757d;
      margin-bottom: 20px;
      word-break: break-all;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ced4da;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4a90e2;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .switch input.no-animation + .slider:before {
      transition: none;
    }
    .disabled-message {
      font-size: 14px;
      color: #dc3545;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="logo"><span>SmoothScroll</span></div>
  <div class="status" id="status"></div>
  <div class="domain" id="domain"></div>
  <label class="switch">
    <input type="checkbox" id="toggleSwitch">
    <span class="slider"></span>
  </label>
  <div class="disabled-message" id="disabledMessage"></div>
  <script src="popup.js"></script>
</body>
</html>
